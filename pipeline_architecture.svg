<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  
  <!-- Background -->
  <rect width="1100" height="850" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Multi-Agent Knowledge Graph Construction Pipeline</text>
  <text x="550" y="55" text-anchor="middle" font-size="11" fill="#666">Varuneesh Johar · Thesis 2026 · Numerical Methods &amp; PDEs</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PHASE 1: INGESTION -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="95" font-size="10" font-weight="600" fill="#0891b2" letter-spacing="1">PHASE 1 — INGESTION</text>
  
  <!-- PDF -->
  <rect x="30" y="105" width="130" height="50" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="95" y="127" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">PDF → LaTeX</text>
  <text x="95" y="142" text-anchor="middle" font-size="8" fill="#666">Mathpix API</text>
  
  <!-- Arrow -->
  <line x1="160" y1="130" x2="195" y2="130" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Chunker -->
  <rect x="195" y="105" width="130" height="50" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="260" y="127" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">Chunker</text>
  <text x="260" y="142" text-anchor="middle" font-size="8" fill="#666">Section-based splitting</text>
  
  <!-- Arrow -->
  <line x1="325" y1="130" x2="360" y2="130" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Classifier -->
  <rect x="360" y="105" width="150" height="50" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="435" y="127" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">Chunk Classifier</text>
  <text x="435" y="142" text-anchor="middle" font-size="8" fill="#666">Rule-based: skip/process</text>

  <!-- Skip label -->
  <line x1="510" y1="120" x2="545" y2="110" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="548" y="113" font-size="8" fill="#ef4444">Skip frontmatter/bibliography</text>

  <!-- Arrow down from classifier to per-chunk -->
  <line x1="435" y1="155" x2="435" y2="185" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="445" y="175" font-size="7" fill="#16a34a">content chunks only</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PHASE 2: PER-CHUNK PIPELINE (boxed) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="188" width="720" height="240" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="35" y="205" font-size="10" font-weight="600" fill="#3b82f6" letter-spacing="1">PHASE 2 — PER-CHUNK PIPELINE (LangGraph)</text>

  <!-- Coreference -->
  <rect x="35" y="215" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Coreference</text>
  <text x="100" y="252" text-anchor="middle" font-size="8" fill="#666">LLM sweep + validate</text>
  
  <line x1="165" y1="240" x2="195" y2="240" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Entity Extraction -->
  <rect x="195" y="215" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Entity Extraction</text>
  <text x="260" y="252" text-anchor="middle" font-size="8" fill="#666">GPT-4o-mini</text>
  
  <line x1="325" y1="240" x2="355" y2="240" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Relation Extraction -->
  <rect x="355" y="215" width="140" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="425" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Relation Extraction</text>
  <text x="425" y="252" text-anchor="middle" font-size="8" fill="#666">GPT-4o-mini · domain→range</text>
  
  <line x1="495" y1="240" x2="525" y2="240" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Validator -->
  <rect x="525" y="215" width="100" height="50" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="575" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">Validator</text>
  <text x="575" y="252" text-anchor="middle" font-size="8" fill="#666">Ontology checks</text>
  
  <line x1="625" y1="240" x2="655" y2="240" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Supervisor -->
  <rect x="655" y="215" width="75" height="50" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="692" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">Supervisor</text>
  <text x="692" y="252" text-anchor="middle" font-size="8" fill="#666">Retry ctrl</text>

  <!-- Retry loop arrow -->
  <path d="M 692 215 C 692 195, 260 195, 260 215" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <text x="470" y="200" text-anchor="middle" font-size="8" fill="#d97706">retry (max 2 per stage)</text>

  <!-- Arrow down from supervisor to alignment row -->
  <line x1="692" y1="265" x2="692" y2="290" stroke="#999" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="700" y="283" font-size="7" fill="#16a34a">valid</text>

  <!-- Alignment -->
  <rect x="35" y="295" width="140" height="50" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="105" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Alignment Agent</text>
  <text x="105" y="332" text-anchor="middle" font-size="8" fill="#666">Embedding dedup + LLM verify</text>
  
  <line x1="175" y1="320" x2="215" y2="320" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Consistency -->
  <rect x="215" y="295" width="150" height="50" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="290" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Consistency Agent</text>
  <text x="290" y="332" text-anchor="middle" font-size="8" fill="#666">Threshold filter → pool/graph</text>
  
  <line x1="365" y1="320" x2="405" y2="320" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Graph Builder -->
  <rect x="405" y="295" width="130" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="470" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Graph Builder</text>
  <text x="470" y="332" text-anchor="middle" font-size="8" fill="#666">Nodes + edges + salience</text>

  <!-- Arrow from consistency to candidate pool -->
  <line x1="290" y1="345" x2="290" y2="405" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <text x="295" y="380" font-size="7" fill="#d97706">NEW_TYPE / NEW_RELATION</text>

  <!-- Document Memory box -->
  <rect x="590" y="295" width="130" height="50" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="655" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Document Memory</text>
  <text x="655" y="332" text-anchor="middle" font-size="8" fill="#666">Cross-chunk entity store</text>
  <line x1="535" y1="320" x2="590" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PHASE 3: ONTOLOGY EVOLUTION -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="420" font-size="10" font-weight="600" fill="#ec4899" letter-spacing="1">PHASE 3 — ONTOLOGY EVOLUTION</text>

  <!-- Candidate Pool -->
  <rect x="30" y="430" width="150" height="55" rx="6" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="105" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#be185d">Candidate Pool</text>
  <text x="105" y="467" text-anchor="middle" font-size="8" fill="#666">Evidence accumulator</text>
  <text x="105" y="478" text-anchor="middle" font-size="7" fill="#999">ontology_candidates.json</text>

  <line x1="180" y1="457" x2="220" y2="457" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Proposer -->
  <rect x="220" y="430" width="150" height="55" rx="6" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="295" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#be185d">Ontology Proposer</text>
  <text x="295" y="467" text-anchor="middle" font-size="8" fill="#666">LLM class naming</text>
  <text x="295" y="478" text-anchor="middle" font-size="7" fill="#999">count ≥ 8 · pool ≥ 20 · every 50</text>

  <line x1="370" y1="457" x2="410" y2="457" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Human Review -->
  <rect x="410" y="430" width="130" height="55" rx="6" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="475" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#be185d">Human Review</text>
  <text x="475" y="467" text-anchor="middle" font-size="8" fill="#666">Accept / Reject / Modify</text>
  <text x="475" y="478" text-anchor="middle" font-size="7" fill="#999">CLI or Streamlit UI</text>

  <line x1="540" y1="457" x2="580" y2="457" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  
  <!-- Reclassification -->
  <rect x="580" y="430" width="155" height="55" rx="6" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="657" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#be185d">Reclassification</text>
  <text x="657" y="463" text-anchor="middle" font-size="8" fill="#666">Entity + Relation reclass</text>
  <text x="657" y="476" text-anchor="middle" font-size="8" fill="#666">+ Rescue stranded rels</text>

  <!-- Arrow from reclassification back up to graph -->
  <line x1="657" y1="430" x2="657" y2="395" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <text x="665" y="412" font-size="7" fill="#047857">→ graph</text>

  <!-- Arrow from reclass to ontology -->
  <rect x="790" y="430" width="150" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="865" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Ontology</text>
  <text x="865" y="467" text-anchor="middle" font-size="8" fill="#666">Core + Extensions (versioned)</text>
  <text x="865" y="478" text-anchor="middle" font-size="7" fill="#999">ontology_extensions_vX_Y.json</text>
  <line x1="735" y1="457" x2="790" y2="457" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- Arrow from ontology back up to extraction (feedback) -->
  <path d="M 865 430 L 865 237 L 730 237" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="875" y="340" font-size="7" fill="#64748b" transform="rotate(-90,875,340)">feeds updated classes to extraction</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PHASE 4: INTER-CHUNK -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="525" font-size="10" font-weight="600" fill="#10b981" letter-spacing="1">PHASE 4 — INTER-CHUNK RELATION EXTRACTION</text>

  <rect x="30" y="535" width="190" height="50" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="125" y="557" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Inter-Chunk Extractor</text>
  <text x="125" y="572" text-anchor="middle" font-size="8" fill="#666">High-salience pairs · LLM</text>

  <line x1="220" y1="560" x2="260" y2="560" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- Knowledge Graph (final) -->
  <rect x="260" y="530" width="220" height="60" rx="8" fill="#047857" stroke="#047857" stroke-width="2"/>
  <text x="370" y="555" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Knowledge Graph</text>
  <text x="370" y="572" text-anchor="middle" font-size="9" fill="#a7f3d0">Nodes + Edges + Provenance + Salience</text>

  <!-- Triggers label -->
  <text x="35" y="600" font-size="7" fill="#666">Triggers: every 30 content chunks · after ontology update · end of document</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- PHASE 5: RETRIEVAL (planned) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="30" y="640" font-size="10" font-weight="600" fill="#6366f1" letter-spacing="1">PHASE 5 — GRAPH-GUIDED RETRIEVAL (PLANNED)</text>

  <rect x="30" y="650" width="130" height="45" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="95" y="670" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">User Query</text>
  <text x="95" y="683" text-anchor="middle" font-size="8" fill="#666">"stable methods for stiff ODEs?"</text>

  <line x1="160" y1="672" x2="195" y2="672" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="195" y="650" width="130" height="45" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="670" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">Graph Traversal</text>
  <text x="260" y="683" text-anchor="middle" font-size="8" fill="#666">Find relevant nodes</text>

  <line x1="325" y1="672" x2="360" y2="672" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="360" y="650" width="130" height="45" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="425" y="670" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">Chunk Retrieval</text>
  <text x="425" y="683" text-anchor="middle" font-size="8" fill="#666">Source chunks from nodes</text>

  <line x1="490" y1="672" x2="525" y2="672" stroke="#999" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <rect x="525" y="650" width="130" height="45" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="590" y="670" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">LLM Answer</text>
  <text x="590" y="683" text-anchor="middle" font-size="8" fill="#666">With provenance</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- KEY FEATURES BOX -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="30" y="720" width="1040" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="745" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Key Design Decisions</text>
  
  <text x="60" y="770" font-size="9" fill="#334155">• <tspan font-weight="600">Ontology-governed extraction</tspan> — all entities/relations validated against a formal ontology with domain-range constraints</text>
  <text x="60" y="788" font-size="9" fill="#334155">• <tspan font-weight="600">Evolving ontology</tspan> — NEW_TYPE/NEW_RELATION candidates accumulate evidence → proposer suggests → human reviews → reclassification backfills</text>
  <text x="60" y="806" font-size="9" fill="#334155">• <tspan font-weight="600">Graph as RAG index</tspan> — the graph maps which concepts exist and which chunks contain them; retrieval uses graph traversal to find precise chunks</text>
  <text x="60" y="824" font-size="9" fill="#334155">• <tspan font-weight="600">Full provenance</tspan> — every node and edge stores source chunk IDs, confidence scores, and salience for traceability</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Arrow markers -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
